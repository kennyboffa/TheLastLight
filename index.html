<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>The Last Light</title>
  <link rel="stylesheet" href="style.css?v=22">
</head>
<body>
  <!-- Portrait-mode overlay (hidden in landscape via CSS media query) -->
  <div id="portrait-warning">
    <div class="rotate-icon">&#x21BA;</div>
    <div>Rotate your device to play</div>
    <div style="color:#556;font-size:11px">The Last Light requires landscape mode</div>
  </div>

  <div id="game-wrap">
    <canvas id="canvas"></canvas>
    <!-- Text input overlay for character name -->
    <div id="name-input-wrap" style="display:none">
      <input id="name-input" type="text" maxlength="16" placeholder="Enter name..." autocomplete="off" spellcheck="false">
    </div>
  </div>

  <!-- Core -->
  <script src="js/config.js?v=22"></script>
  <script src="js/utils.js?v=22"></script>
  <script src="js/state.js?v=22"></script>
  <!-- Data -->
  <script src="js/data/items.js?v=22"></script>
  <script src="js/data/recipes.js?v=22"></script>
  <script src="js/data/events.js?v=22"></script>
  <script src="js/data/locations.js?v=22"></script>
  <!-- Systems -->
  <script src="js/systems/audio.js?v=22"></script>
  <script src="js/systems/stats.js?v=22"></script>
  <script src="js/systems/crafting.js?v=22"></script>
  <script src="js/systems/combat.js?v=22"></script>
  <script src="js/systems/saveLoad.js?v=22"></script>
  <!-- Render -->
  <script src="js/render/sprites.js?v=22"></script>
  <script src="js/render/ui.js?v=22"></script>
  <!-- Screens -->
  <script src="js/screens/title.js?v=22"></script>
  <script src="js/screens/intro.js?v=22"></script>
  <script src="js/screens/charCreate.js?v=22"></script>
  <script src="js/screens/shelter.js?v=22"></script>
  <script src="js/screens/exploreSelect.js?v=22"></script>
  <script src="js/screens/packScreen.js?v=22"></script>
  <script src="js/screens/explore.js?v=22"></script>
  <script src="js/screens/combatScreen.js?v=22"></script>
  <script src="js/screens/lootPickup.js?v=22"></script>
  <script src="js/screens/eventScreen.js?v=22"></script>
  <!-- Main -->
  <script src="js/main.js?v=22"></script>
</body>
</html>
